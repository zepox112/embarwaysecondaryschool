<!DOCTYPE html>
<html lang="sw">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=0.3">
    <title>Embarway Library | No-Error Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #000;
            color: #fff;
            width: 1280px;
            margin: 0 auto;
        }

        .liquid-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        .video-box {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body class="pb-20">

    <nav class="flex justify-between items-center p-8 border-b border-emerald-500/20">
        <h1 class="text-2xl font-black italic">EMBARWAY <span class="text-emerald-500 text-3xl">.</span></h1>
        <div class="flex gap-8 items-center">
            <input type="text" id="mainSearch" oninput="renderContent()" placeholder="Tafuta hapa..."
                class="bg-white/5 border border-white/20 rounded-full px-6 py-2 w-80 outline-none focus:border-emerald-500">
            <div class="text-[10px] text-emerald-500 font-bold uppercase tracking-widest">Digital Campus</div>
        </div>
    </nav>

    <div class="p-10">
        <section>
            <h2 class="text-xl font-bold mb-8 text-white uppercase tracking-tighter">Video za <span
                    class="text-emerald-500">Masomo</span></h2>
            <div id="videoGrid" class="grid grid-cols-3 gap-8">
            </div>
        </section>

        <section class="mt-20">
            <h2 class="text-xl font-bold mb-8 text-white uppercase tracking-tighter">Maktaba ya <span
                    class="text-emerald-500">Vitabu (PDF)</span></h2>
            <div id="booksGrid" class="grid grid-cols-4 gap-6">
            </div>
        </section>
    </div>

    <script>
        // Orodha ya Video (Tumia ID pekee)
        const studyVideos = [
            { t: "Biology: Cells & Life", id: "MyWlAPRlwbw", sub: "Form 1 & 2" },
            { t: "Physics: Force & Motion", id: "cx-d-x2rRdY", sub: "Form 3" },
            { t: "Chemistry: Atomic Structure", id: "iddF_bMs6Sc", sub: "Advanced" },
            { t: "Kilio Chetu: Uchambuzi", id: "IZaGAsnBzdo", sub: "Kiswahili" },
            { t: "Ngoswe: Penzi Kitovu cha Uzembe", id: "7UA1f3FEq6E", sub: "Kiswahili" },
            { t: "English: Literature Theories", id: "z1vgVgafz3o", sub: "Form 4" }
        ];

        // Orodha ya Vitabu
        const books = [
            { t: "Physics Form 1 - Full", l: "https://drive.google.com/file/d/1jp5e_nbEeK3MVxzvmYLzTckyGbHr2YL1/view" },
            { t: "Chemistry Form 1 - Full", l: "https://drive.google.com/file/d/1l6kkYFUn1HbP8if3LYxv0EuSMGbqn8s-/view" },
            { t: "Biology Form 1 - Full", l: "https://drive.google.com/file/d/1FgFNFnM6cujQYvGzqtinxRaxMe2rYX_C/view" },
            { t: "Advanced Math Form 5", l: "https://drive.google.com/file/d/1zxzR3gVvAvQQWijYj6L_YX-AG21V4crf/view" }
        ];

        function renderContent() {
            const q = document.getElementById('mainSearch').value.toLowerCase();

            // Render Videos
            const vGrid = document.getElementById('videoGrid');
            vGrid.innerHTML = studyVideos.filter(v => v.t.toLowerCase().includes(q))
                .map((v, index) => `
                <div class="liquid-glass p-4 group">
                    <div id="vid-container-${index}" class="video-box mb-4">
                        <div class="absolute inset-0 cursor-pointer z-10" onclick="loadVideo(${index}, '${v.id}')">
                            <img src="https://img.youtube.com/vi/${v.id}/maxresdefault.jpg" class="w-full h-full object-cover opacity-50">
                            <div class="absolute inset-0 flex items-center justify-center">
                                <div class="w-16 h-16 bg-emerald-500 rounded-full flex items-center justify-center shadow-2xl group-hover:scale-110 transition">
                                    <svg class="w-8 h-8 text-black ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                    <h3 class="font-bold text-sm text-white px-2">${v.t}</h3>
                    <p class="text-[10px] text-emerald-500 px-2 font-bold uppercase mt-1">${v.sub}</p>
                </div>`).join('');

            // Render Books
            const bGrid = document.getElementById('booksGrid');
            bGrid.innerHTML = books.filter(b => b.t.toLowerCase().includes(q))
                .map(b => `
                <div class="liquid-glass p-6 flex flex-col justify-between hover:border-emerald-500 transition cursor-default">
                    <h3 class="font-bold text-white mb-4 leading-tight">${b.t}</h3>
                    <button onclick="window.open('${b.l}', '_blank')" class="w-full bg-emerald-500/10 border border-emerald-500/40 py-2 rounded-xl text-[10px] font-black text-emerald-500 hover:bg-emerald-500 hover:text-black transition uppercase">Soma Kitabu</button>
                </div>`).join('');
        }

        function loadVideo(index, id) {
            // RAM Management: Futa video yoyote inayocheza sasa hivi kabla ya kufungua mpya
            const allContainers = document.querySelectorAll('[id^="vid-container-"]');
            renderContent(); // Hii inarudisha muonekano wa picha (Thumbnails)

            // Weka video mpya kwa kutumia youtube-nocookie
            const container = document.getElementById(`vid-container-${index}`);
            container.innerHTML = `
                <iframe 
                    src="https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0&showinfo=0&modestbranding=1" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>`;
        }

        // Pakia kila kitu ukurasa ukifunguka
        window.onload = renderContent;
    </script>
</body>

</html>
